<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="robots" content="noindex,nofollow"/>
  <title>Lanz Group – Coming Soon</title>

  <!-- Preconnect für Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lato:wght@300;700&display=swap" rel="stylesheet"/>

  <style>
    /* ── RESET & VARIABLEN ── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root{
      --black:#080808;
      --white:#f5f5f0;
      --accent:#c8a96e;
    }

    html,body{
      height:100%;
      background:var(--black);
      color:var(--white);
      font-family:'Lato',sans-serif;
      overflow:hidden;
    }

    /* Noise overlay */
    body::before{
      content:'';
      position:fixed;
      inset:0;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity:.04;
      pointer-events:none;
      z-index:0;
      transform:translateZ(0);
    }

    /* Diagonale Akzentlinie */
    body::after{
      content:'';
      position:fixed;
      top:-10%;right:8%;
      width:1px;height:120%;
      background:linear-gradient(to bottom,transparent,var(--accent) 30%,var(--accent) 70%,transparent);
      opacity:.25;
      transform:rotate(8deg) translateZ(0);
      pointer-events:none;
      z-index:0;
    }

    /* ── LAYOUT ── */
    .page{
      position:relative;
      z-index:1;
      height:100vh;
      display:grid;
      grid-template-rows:auto 1fr auto;
      padding:clamp(2rem,5vw,5rem);
    }

    /* ── ANIMATIONEN ── */
    @keyframes fadeUp{
      from{opacity:0;transform:translateY(20px)}
      to  {opacity:1;transform:translateY(0)}
    }
    @keyframes pulse{
      0%,100%{opacity:1;transform:scale(1)}
      50%    {opacity:.4;transform:scale(.7)}
    }

    .a1{opacity:0;animation:fadeUp .7s ease  .1s forwards}
    .a2{opacity:0;animation:fadeUp .7s ease  .3s forwards}
    .a3{opacity:0;animation:fadeUp .8s ease .45s forwards}
    .a4{opacity:0;animation:fadeUp .7s ease  .6s forwards}
    .a5{opacity:0;animation:fadeUp .7s ease .75s forwards}
    .a6{opacity:0;animation:fadeUp .7s ease  .9s forwards}

    /* ── HEADER ── */
    .top-bar{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
    }

    .logo-wrap{
      display:flex;
      align-items:center;
      gap:1rem;
    }

    .logo-wrap img{
      width:52px;height:52px;
      object-fit:contain;
      filter:invert(1);
    }

    .brand-name{
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(1.4rem,2.5vw,2rem);
      letter-spacing:.12em;
      line-height:1;
    }

    .status-badge{
      display:flex;
      align-items:center;
      gap:.5rem;
      font-size:.7rem;
      letter-spacing:.2em;
      text-transform:uppercase;
      color:var(--accent);
      font-weight:700;
      border:1px solid rgba(200,169,110,.3);
      padding:.4rem .8rem;
      border-radius:2px;
    }

    .status-dot{
      width:6px;height:6px;
      border-radius:50%;
      background:var(--accent);
      animation:pulse 2s ease-in-out infinite;
      will-change:opacity,transform;
    }

    /* ── MAIN ── */
    .main{
      display:flex;
      flex-direction:column;
      justify-content:center;
      padding:2rem 0;
    }

    .eyebrow{
      font-size:.7rem;
      letter-spacing:.35em;
      text-transform:uppercase;
      color:var(--accent);
      font-weight:700;
      margin-bottom:1.5rem;
    }

    .headline{
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(4rem,12vw,11rem);
      line-height:.9;
      letter-spacing:.02em;
    }

    .headline span{
      display:block;
      color:transparent;
      -webkit-text-stroke:1px rgba(245,245,240,.25);
    }

    .divider{
      width:clamp(60px,8vw,100px);
      height:2px;
      background:linear-gradient(to right,var(--accent),transparent);
      margin:2rem 0;
    }

    .subtext{
      font-size:clamp(.85rem,1.5vw,1rem);
      font-weight:300;
      color:rgba(245,245,240,.55);
      line-height:1.8;
      max-width:460px;
      letter-spacing:.04em;
    }

    /* ── FOOTER ── */
    .contact-bar{
      display:flex;
      justify-content:space-between;
      align-items:flex-end;
      flex-wrap:wrap;
      gap:1.5rem;
      padding-top:2rem;
      border-top:1px solid rgba(245,245,240,.08);
    }

    .contact-group{
      display:flex;
      gap:2.5rem;
      flex-wrap:wrap;
      align-items:flex-end;
    }

    .contact-label{
      font-size:.65rem;
      letter-spacing:.3em;
      text-transform:uppercase;
      color:rgba(245,245,240,.35);
      margin-bottom:.4rem;
    }

    .contact-link{
      display:flex;
      align-items:center;
      gap:.6rem;
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(1.2rem,2.5vw,1.7rem);
      letter-spacing:.1em;
      color:var(--white);
      text-decoration:none;
      transition:color .2s ease;
    }

    .contact-link:hover{color:var(--accent)}

    .icon{
      width:18px;height:18px;
      opacity:.6;
    }

    .copy-note{
      font-size:.65rem;
      letter-spacing:.15em;
      color:rgba(245,245,240,.2);
      text-transform:uppercase;
      text-align:right;
    }

    /* ── RESPONSIVE ── */
    @media(max-width:600px){
      body::after{display:none}
      .contact-bar{flex-direction:column;align-items:flex-start}
      .copy-note{text-align:left}
    }

    /* Reduced motion */
    @media(prefers-reduced-motion:reduce){
      .a1,.a2,.a3,.a4,.a5,.a6{animation:none;opacity:1}
      .status-dot{animation:none}
    }
  </style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <header class="top-bar a1">
    <div class="logo-wrap">
      <!-- Logo im Root-Verzeichnis ablegen als: logo.jpeg -->
      <img src="/logo.jpeg" alt="Lanz Group Logo" width="52" height="52" loading="eager" decoding="async"/>
      <span class="brand-name">Lanz Group</span>
    </div>
    <div class="status-badge">
      <span class="status-dot" aria-hidden="true"></span>
      Im Aufbau
    </div>
  </header>

  <!-- MAIN -->
  <main class="main">
    <p class="eyebrow a2">Wir kommen bald</p>
    <h1 class="headline a3">
      Etwas Grosses<br/>
      <span>entsteht hier.</span>
    </h1>
    <div class="divider a4" aria-hidden="true"></div>
    <p class="subtext a5">
      Unsere Website befindet sich derzeit im Aufbau.<br/>
      Für Anfragen stehen wir Ihnen bereits jetzt gerne zur Verfügung.
    </p>
  </main>

  <!-- FOOTER -->
  <footer class="contact-bar a6">
    <div class="contact-group">
      <div>
        <p class="contact-label">Telefon</p>
        <a class="contact-link" href="tel:+41767436163">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.67A2 2 0 012 0h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 14.92z"/>
          </svg>
          +41 76 743 61 63
        </a>
      </div>
      <div>
        <p class="contact-label">E-Mail</p>
        <a class="contact-link" href="mailto:m.lanz@lanz-group.ch">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="M2 7l10 7 10-7"/>
          </svg>
          m.lanz@lanz-group.ch
        </a>
      </div>
    </div>
    <p class="copy-note">© 2025 Lanz Group</p>
  </footer>

</div>
</body>
</html>
